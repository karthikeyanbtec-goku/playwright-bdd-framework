name: Playwright BDD Enterprise Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.analysis.outputs.tags }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Analysis Agent
      id: analysis
      run: npx ts-node src/agents/analysis-agent.ts

  test:
    needs: analyze
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5] # Tier 2: Dynamic Sharding (Simplified for now)
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright BDD tests
      run: npx cucumber-js --tags "${{ needs.analyze.outputs.tags }}"
      env:
        ENV: qa
        BASE_URL: https://qa.example.com
        ADMIN_USER: ${{ secrets.ADMIN_USER }}
        ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        
    - name: Generate Allure Report
      run: npx allure generate allure-results --clean -o allure-report
      if: always()

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report-shard-${{ matrix.shard }}
        path: allure-report/
        retention-days: 10
